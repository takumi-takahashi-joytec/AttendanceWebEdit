# 成功メッセージ
SUCCESS_AUTH = 認証成功。全項目を操作可能です。
SUCCESS_REGISTER = 登録が完了しました。
SUCCESS_EDIT = 編集が完了しました。
SUCCESS_DELETE = 削除が完了しました。

# エラーメッセージ（一般）
ERROR_ID_FORMAT = 社員コードは5桁の半角数字で入力してください。
ERROR_ID_INVALID = 社員コードが正しくありません。
ERROR_SERVER = サーバーエラーが発生しました。管理者に連絡してください。

# モード選択エラー
MODE_SELECTION_ERROR = モード選択エラーが発生しました。

# 土日判定メッセージ
WEEKDAY_SATURDAY= 土曜日が選択されています。
WEEKDAY_SUNDAY= 日曜日が選択されています。

# 登録バリデーションエラー
ERROR_DATE_EMPTY = 年月日が未入力です。
ERROR_DATE_EXISTS = この年月日は既に登録されています。
ERROR_PERIOD_OUT_OF_RANGE_REGISTER = 対象期間外の日付です。
ERROR_TIME_START = 開始時刻が未入力です。
ERROR_TIME_END = 終了時刻が未入力です。
ERROR_TIME_FORMAT = 正しい時刻を入力してください。
ERROR_STATUS_REST_TIME = 休日ステータスの場合、開始時刻・終了時刻は入力できません。
ERROR_NOTE_TOO_LONG = 備考は100文字以内で入力してください。

# 編集バリデーションエラー
ERROR_EDIT_PERIOD_OUT_OF_RANGE=編集可能な期間外です。
ERROR_EDIT_DATE_EXISTS=編集対象のデータが存在しません。
ERROR_EDIT_TIME_START=開始時刻は必須です。
ERROR_EDIT_TIME_END=終了時刻は必須です。
ERROR_EDIT_TIME_FORMAT=時刻形式が無効です。
ERROR_EDIT_STATUS_REST_TIME=休暇ステータス時には時刻を入力できません。
ERROR_EDIT_NOTE_TOO_LONG=備考は100文字以内で入力してください。

# 削除バリデーションエラー
ERROR_PERIOD_OUT_OF_RANGE_DELETE = 対象期間外の日付です。
ERROR_DELETE_NO_DATA = 該当日付の勤怠データが存在しません。

# 全体エラー（バリデーション失敗時の上部表示）
ERROR_REGISTER_FAILED = 勤怠登録エラーが発生しました。
ERROR_EDIT_FAILED = 勤怠編集エラーが発生しました。

# ポップアップ確認メッセージ
CONFIRM_REGISTER = 以下の内容で登録しますか？
CONFIRM_EDIT = 以下の内容に更新しますか？
CONFIRM_DELETE = この日の勤怠データを削除しますか？<br>※削除したデータは復元できません


